<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countries Visited</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      gap: 16px;
    }

    h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f8fafc;
      white-space: nowrap;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stat { text-align: center; }

    .stat-number {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-top: 2px;
    }

    .visited-count { color: #4ade80; }
    .total-count   { color: #94a3b8; }
    .pct-count     { color: #60a5fa; }

    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .swatch.visited   { background: #4ade80; }
    .swatch.unvisited { background: #1e3a5f; border: 1px solid #2d5986; }

    /* ── Main split ─────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #map-container {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    svg:active { cursor: grabbing; }

    .country {
      stroke: #0f172a;
      stroke-width: 0.4px;
      cursor: pointer;
      transition: filter 0.1s;
    }

    .country.unvisited { fill: #1e3a5f; }
    .country.visited   { fill: #4ade80; }
    .country:hover     { filter: brightness(1.35); }

    .graticule { fill: none; stroke: #1e2d45; stroke-width: 0.3px; }
    .sphere    { fill: #0a1929; }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.82rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 10;
    }

    #tooltip .tip-name   { font-weight: 600; color: #f1f5f9; }
    #tooltip .tip-status { margin-top: 2px; font-size: 0.75rem; }
    #tooltip .tip-status.v { color: #4ade80; }
    #tooltip .tip-status.u { color: #64748b; }

    .map-controls {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ctrl-btn {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .ctrl-btn:hover { background: #334155; }

    .clear-btn {
      position: absolute;
      bottom: 14px;
      left: 14px;
      padding: 6px 13px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.76rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover { background: #334155; color: #e2e8f0; }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .share-btn:hover { background: #334155; color: #e2e8f0; }
    .share-btn.copied { color: #4ade80; border-color: #4ade80; }
    .share-btn svg { width: 14px; height: 14px; stroke: currentColor; flex-shrink: 0; }

    /* ── Drag resize handle ─────────────────────────────────── */
    #drag-handle {
      height: 6px;
      background: #1e293b;
      border-top: 1px solid #334155;
      border-bottom: 1px solid #334155;
      cursor: ns-resize;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #drag-handle::after {
      content: "";
      width: 32px;
      height: 2px;
      border-radius: 1px;
      background: #475569;
    }

    #drag-handle:hover::after { background: #64748b; }

    /* ── Country grid panel ─────────────────────────────────── */
    #grid-panel {
      height: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #0f172a;
      min-height: 0;
    }

    #grid-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }

    #grid-header span {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }

    #grid-search {
      flex: 1;
      max-width: 240px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.78rem;
      padding: 4px 10px;
      outline: none;
    }

    #grid-search::placeholder { color: #475569; }
    #grid-search:focus { border-color: #4ade80; }

    #toggle-grid {
      margin-left: auto;
      background: none;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #64748b;
      font-size: 0.72rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #toggle-grid:hover { color: #e2e8f0; border-color: #64748b; }

    #country-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 2px;
      padding: 8px 12px;
      align-content: start;
    }

    #country-grid::-webkit-scrollbar { width: 6px; }
    #country-grid::-webkit-scrollbar-track { background: transparent; }
    #country-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .cb-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 7px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .cb-item:hover { background: #1e293b; }

    .cb-item input[type="checkbox"] {
      accent-color: #4ade80;
      width: 13px;
      height: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .cb-item .cb-label {
      font-size: 0.78rem;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
      user-select: none;
    }

    .cb-item.checked .cb-label { color: #4ade80; }

    .cb-hidden { display: none !important; }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 8px 12px; gap: 10px; }
      h1 { font-size: 0.9rem; }
      .stats { gap: 12px; }
      .stat-number { font-size: 1.15rem; }
      .legend { display: none; }
      .share-btn { padding: 6px 8px; }
      .share-btn .share-label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Countries Visited</h1>
  <div class="stats">
    <div class="stat">
      <div class="stat-number visited-count" id="visited-count">0</div>
      <div class="stat-label">Visited</div>
    </div>
    <div class="stat">
      <div class="stat-number total-count" id="total-count">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-number pct-count" id="pct-count">0%</div>
      <div class="stat-label">Complete</div>
    </div>
    <button class="share-btn" id="share-btn" title="Copy shareable URL">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
      <span class="share-label">Share</span>
    </button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="swatch visited"></div> Visited</div>
    <div class="legend-item"><div class="swatch unvisited"></div> Not visited</div>
    <span style="font-size:0.72rem;color:#475569">Click map or checkboxes to toggle</span>
  </div>
</header>

<div id="main">
  <div id="map-container">
    <div id="tooltip">
      <div class="tip-name" id="tip-name"></div>
      <div class="tip-status" id="tip-status"></div>
    </div>

    <div class="map-controls">
      <button class="ctrl-btn" id="zoom-in"    title="Zoom in">+</button>
      <button class="ctrl-btn" id="zoom-out"   title="Zoom out">−</button>
      <button class="ctrl-btn" id="zoom-reset" title="Reset view">⌂</button>
    </div>

    <button class="clear-btn" id="clear-btn">Clear all</button>
  </div>

  <div id="drag-handle"></div>

  <div id="grid-panel">
    <div id="grid-header">
      <span>All Countries</span>
      <input id="grid-search" type="text" placeholder="Search countries…" autocomplete="off" />
      <button id="toggle-grid">Hide ▾</button>
    </div>
    <div id="country-grid"></div>
  </div>
</div>

  // codes. URL positions are assigned separately in BIT_POSITIONS.

// this patch they all collide under a single "undefined" key — clicking one marks
// them all, and the tooltip reads "Country undefined". Map them by properties.name
// to the synthetic IDs declared above so each is tracked independently.
const SYNTHETIC_ID_BY_NAME = {
  "Kosovo":     "900",
  "N. Cyprus":  "901",
  "Somaliland": "902",
};

// Countries present as sovereign states but too small to render on any practical
// world map. These appear in the checkbox grid only — no map shape.
const MAPLESS_COUNTRIES = [
  { id: "336", name: "Vatican City" },
  { id: "492", name: "Monaco" },
  { id: "674", name: "San Marino" },
  { id: "438", name: "Liechtenstein" },
  { id: "520", name: "Nauru" },
  { id: "798", name: "Tuvalu" },
];

// IDs to merge into another: { sourceId: canonicalId }. Both render as the canonical name.
const MERGE = { "376": "275" }; // Israel → Palestine

// Normalize to unpadded decimal string ("056" → "56"). world-atlas stores IDs < 100
// as zero-padded strings, but NAMES keys and BIT_POSITIONS drop the padding.
// Canonicalizing here keeps `visited`, localStorage, and the URL bitmask all
// speaking the same dialect.
function effectiveId(rawId) {
  const n = parseInt(rawId, 10);
  if (isNaN(n)) return String(rawId);
  const s = String(n);
  return MERGE[s] || s;
}

// Prefer the curated NAMES label, but fall back to the topojson properties.name
// before landing on "Country <id>" — guards against any future Natural Earth
// feature we haven't explicitly mapped still rendering as "Country undefined".
function featureName(d, id) {
  return NAMES[parseInt(id, 10)]
    || (d && d.properties && d.properties.name)
    || ("Country " + id);
}

const STORAGE_KEY = "visited-countries-v1";

const BITMASK_BYTES = Math.ceil(
  (Math.max(...Object.values(BIT_POSITIONS)) + 1) / 8
);

function encodeVisited(set) {
  const bytes = new Uint8Array(BITMASK_BYTES);
  for (const id of set) {
    const pos = BIT_POSITIONS[id];
    if (pos != null) bytes[pos >> 3] |= 1 << (pos & 7);
  }
  return btoa(String.fromCharCode(...bytes));
}

function decodeVisited(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const result = new Set();
  for (const id in BIT_POSITIONS) {
    const pos = BIT_POSITIONS[id];
    if (bytes[pos >> 3] & (1 << (pos & 7))) result.add(id);
  }
  return result;
}

function updateURL() {
  history.replaceState(null, "", location.pathname + "?=" + encodeVisited(visited));
}

// On load: URL takes priority over localStorage (enables shared links)
function loadInitialState() {
  const qs = location.search;
  if (qs.startsWith("?=")) {
    try { return decodeVisited(qs.slice(2)); } catch (_) {}
  }
  try {
    // Drop the legacy "undefined" entry produced by prior versions that stored a
    // single shared key for every feature without an ISO numeric id.
    return new Set(
      JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")
        .map(id => effectiveId(id))
        .filter(id => id !== "undefined")
    );
  } catch (_) {}
  return new Set();
}

let visited = loadInitialState();
let totalCountries = 0;

// ─── SVG setup ────────────────────────────────────────────────────────────────
const mapContainer = document.getElementById("map-container");
const w = () => mapContainer.clientWidth;
const h = () => mapContainer.clientHeight;

const svg = d3.select("#map-container").append("svg");
const g   = svg.append("g");

const projection = d3.geoNaturalEarth1();
const SPHERE = { type: "Sphere" };

// Auto-fit the projection so the globe always fills the map container.
// Called on init and on resize so the map never shrinks below the viewport.
function fitProjection() {
  projection.fitSize([w(), h()], SPHERE);
}
fitProjection();

const path = d3.geoPath().projection(projection);

g.append("path").datum({type:"Sphere"}).attr("class","sphere").attr("d", path);
g.append("path").datum(d3.geoGraticule()()).attr("class","graticule").attr("d", path);

// ─── Zoom ─────────────────────────────────────────────────────────────────────
const zoom = d3.zoom()
  .scaleExtent([1, 12])
  .extent([[0, 0], [w(), h()]])
  .translateExtent([[0, 0], [w(), h()]]) // pan is clamped to the viewport at scale 1
  .on("zoom", e => g.attr("transform", e.transform));

svg.call(zoom);

document.getElementById("zoom-in").addEventListener("click",
  () => svg.transition().duration(300).call(zoom.scaleBy, 1.5));
document.getElementById("zoom-out").addEventListener("click",
  () => svg.transition().duration(300).call(zoom.scaleBy, 1 / 1.5));
document.getElementById("zoom-reset").addEventListener("click",
  () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity));

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tooltip   = document.getElementById("tooltip");
const tipName   = document.getElementById("tip-name");
const tipStatus = document.getElementById("tip-status");

function showTip(event, name, isVisited) {
  tipName.textContent = name;
  tipStatus.textContent = isVisited ? "✓ Visited" : "Not visited — click to mark";
  tipStatus.className = "tip-status " + (isVisited ? "v" : "u");
  tooltip.style.opacity = 1;
  moveTip(event);
}

function moveTip(event) {
  const x = event.offsetX, y = event.offsetY;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  const cx = mapContainer.clientWidth, cy = mapContainer.clientHeight;
  tooltip.style.left = (x + 14 + tw > cx ? x - tw - 10 : x + 14) + "px";
  tooltip.style.top  = (y + 14 + th > cy ? y - th - 10 : y + 14) + "px";
}

function hideTip() { tooltip.style.opacity = 0; }

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("visited-count").textContent = visited.size;
  document.getElementById("total-count").textContent   = totalCountries || "—";
  document.getElementById("pct-count").textContent =
    totalCountries ? Math.round(visited.size / totalCountries * 100) + "%" : "0%";
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...visited]));
  updateURL();
}

// ─── Core toggle (called from both map clicks and checkboxes) ─────────────────
function setCountry(id, state) {
  if (state) visited.add(id);
  else        visited.delete(id);

  // Update all map paths that share this effective ID (e.g. merged regions)
  d3.selectAll(".country")
    .filter(d => effectiveId(d.id) === id)
    .classed("visited",   state)
    .classed("unvisited", !state);

  // Update checkbox
  const item = document.querySelector(`.cb-item[data-id="${id}"]`);
  if (item) {
    item.classList.toggle("checked", state);
    item.querySelector("input").checked = state;
  }

  save();
  updateStats();
}

// ─── Load world data ──────────────────────────────────────────────────────────
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(world => {
  // Patch features that topojson emits with id=undefined (ISO_N3 "-99" in Natural
  // Earth) using their properties.name. Do this before the merge pass so downstream
  // keying by String(g.id) has a stable value.
  world.objects.countries.geometries.forEach(g => {
    if (g.id == null || isNaN(parseInt(g.id, 10))) {
      const syn = SYNTHETIC_ID_BY_NAME[g.properties && g.properties.name];
      if (syn) g.id = syn;
    }
  });

  // Geometrically merge regions listed in MERGE so they render as one seamless shape.
  const mergeGroups = {}; // canonicalId → [topoGeom, ...]
  world.objects.countries.geometries.forEach(g => {
    const canon = MERGE[String(g.id)] || String(g.id);
    if (!mergeGroups[canon]) mergeGroups[canon] = [];
    mergeGroups[canon].push(g);
  });

  const mergedIds = new Set(Object.keys(MERGE)); // IDs that get absorbed
  let countries = topojson.feature(world, world.objects.countries).features
    .filter(d => !mergedIds.has(String(d.id))); // drop absorbed originals

  // For each group with >1 geometry, dissolve shared borders and inject a single feature
  Object.entries(mergeGroups).forEach(([canonId, geoms]) => {
    if (geoms.length < 2) return;
    const merged = topojson.merge(world, geoms);
    countries = countries.filter(d => String(d.id) !== canonId); // remove old canonical
    countries.push({ type: "Feature", id: canonId, geometry: merged, properties: {} });
  });

  // Map paths
  g.selectAll(".country")
    .data(countries)
    .join("path")
    .attr("class", d => "country " + (visited.has(effectiveId(d.id)) ? "visited" : "unvisited"))
    .attr("d", path)
    .on("click", function(event, d) {
      event.stopPropagation();
      const id = effectiveId(d.id);
      const next = !visited.has(id);
      setCountry(id, next);
      showTip(event, featureName(d, id), next);
    })
    .on("mousemove", (event) => moveTip(event))
    .on("mouseenter", function(event, d) {
      const id = effectiveId(d.id);
      showTip(event, featureName(d, id), visited.has(id));
    })
    .on("mouseleave", hideTip);

  // Build sorted checkbox grid — deduplicate merged regions, add mapless microstates
  const seen = new Set();
  const fromMap = countries
    .filter(d => d.id != null && !isNaN(parseInt(d.id, 10)))
    .map(d => ({ id: effectiveId(d.id), name: featureName(d, effectiveId(d.id)) }))
    .filter(({ id }) => { if (seen.has(id)) return false; seen.add(id); return true; });

  // Append mapless microstates that aren't already covered by a map shape
  const maplessExtra = MAPLESS_COUNTRIES.filter(({ id }) => !seen.has(id));

  const sorted = [...fromMap, ...maplessExtra]
    .sort((a, b) => a.name.localeCompare(b.name));

  totalCountries = sorted.length;

  const grid = document.getElementById("country-grid");
  sorted.forEach(({ id, name }) => {
    const item = document.createElement("label");
    item.className = "cb-item" + (visited.has(id) ? " checked" : "");
    item.dataset.id = id;

    const cb = document.createElement("input");
    cb.type    = "checkbox";
    cb.checked = visited.has(id);
    cb.addEventListener("change", () => setCountry(id, cb.checked));

    const span = document.createElement("span");
    span.className   = "cb-label";
    span.textContent = name;
    span.title       = name;

    item.appendChild(cb);
    item.appendChild(span);
    grid.appendChild(item);
  });

  updateStats();
});

// ─── Search filter ────────────────────────────────────────────────────────────
document.getElementById("grid-search").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll(".cb-item").forEach(item => {
    const name = item.querySelector(".cb-label").textContent.toLowerCase();
    item.classList.toggle("cb-hidden", q.length > 0 && !name.includes(q));
  });
});

// ─── Toggle grid visibility ───────────────────────────────────────────────────
const gridPanel  = document.getElementById("grid-panel");
const dragHandle = document.getElementById("drag-handle");
const toggleBtn  = document.getElementById("toggle-grid");
let gridVisible  = true;
let savedHeight  = 220;

toggleBtn.addEventListener("click", () => {
  gridVisible = !gridVisible;
  if (gridVisible) {
    gridPanel.style.height  = savedHeight + "px";
    dragHandle.style.display = "";
    toggleBtn.textContent    = "Hide ▾";
  } else {
    savedHeight              = gridPanel.offsetHeight;
    gridPanel.style.height   = "0px";
    dragHandle.style.display = "none";
    toggleBtn.textContent    = "Show ▴";
  }
});

// ─── Drag to resize ───────────────────────────────────────────────────────────
let dragging = false, dragStartY = 0, dragStartH = 0;

dragHandle.addEventListener("mousedown", e => {
  dragging   = true;
  dragStartY = e.clientY;
  dragStartH = gridPanel.offsetHeight;
  document.body.style.userSelect = "none";
  document.body.style.cursor     = "ns-resize";
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  const delta  = dragStartY - e.clientY;
  const newH   = Math.max(60, Math.min(dragStartH + delta, window.innerHeight * 0.7));
  gridPanel.style.height = newH + "px";
});

window.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  document.body.style.userSelect = "";
  document.body.style.cursor     = "";
  savedHeight = gridPanel.offsetHeight;
});

// ─── Mobile: expand grid-panel on search focus so the keyboard doesn't hide
// the input and results. Body has overflow:hidden, so scrollIntoView can't
// help; instead we grow the panel upward above the keyboard.
const MOBILE_BP = 640;
const gridSearch = document.getElementById("grid-search");
let preFocusHeight = null;

gridSearch.addEventListener("focus", () => {
  if (window.innerWidth > MOBILE_BP) return;
  preFocusHeight = gridPanel.style.height || (savedHeight + "px");
  gridPanel.style.height = "70vh";
});

gridSearch.addEventListener("blur", () => {
  if (preFocusHeight == null) return;
  gridPanel.style.height = preFocusHeight;
  preFocusHeight = null;
});

// ─── Clear all ────────────────────────────────────────────────────────────────
document.getElementById("clear-btn").addEventListener("click", () => {
  if (!confirm("Clear all visited countries?")) return;
  [...visited].forEach(id => setCountry(id, false));
});

// ─── Share (copy URL) ─────────────────────────────────────────────────────────
const shareBtn   = document.getElementById("share-btn");
const shareLabel = shareBtn.querySelector(".share-label");
const shareOriginal = shareLabel.textContent;
let shareResetTimer;

shareBtn.addEventListener("click", async () => {
  updateURL(); // make sure the bitmask reflects current state
  const url = location.href;
  try {
    await navigator.clipboard.writeText(url);
  } catch (_) {
    // Fallback for non-secure contexts / older browsers
    const ta = document.createElement("textarea");
    ta.value = url;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    document.body.removeChild(ta);
  }
  shareLabel.textContent = "Copied!";
  shareBtn.classList.add("copied");
  clearTimeout(shareResetTimer);
  shareResetTimer = setTimeout(() => {
    shareLabel.textContent = shareOriginal;
    shareBtn.classList.remove("copied");
  }, 1500);
});

// ─── Resize window ────────────────────────────────────────────────────────────
window.addEventListener("resize", () => {
  fitProjection();
  zoom.extent([[0, 0], [w(), h()]])
      .translateExtent([[0, 0], [w(), h()]]);
  g.selectAll(".country").attr("d", path);
  g.selectAll(".sphere").attr("d", path);
  g.selectAll(".graticule").attr("d", path);
});
</script>
